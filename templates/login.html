<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Medi-AI-tor</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }
        .login-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-input {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f1f5f9;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #818cf8; }
        .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }
        .error-msg {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.85rem;
            margin-bottom: 16px;
            display: none;
            animation: errorShake 0.3s ease;
        }
        .error-msg.visible { display: block; }
        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .roles-hint {
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid #334155;
            font-size: 0.78rem;
            color: #64748b;
            text-align: center;
        }
        .roles-hint strong { color: #94a3b8; }
        .security-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 0.72rem;
            color: #22c55e;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <span style="font-size:2.5rem;display:block;margin-bottom:12px">🩺</span>
            <h1>Medi-AI-tor</h1>
            <p>Dell Server AI Management Console</p>
        </div>

        <div id="errorMsg" class="error-msg"></div>

        <form id="loginForm" autocomplete="on">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" class="form-input" placeholder="Username" autocomplete="username" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Password" autocomplete="current-password" required>
            </div>
            <button type="submit" id="loginBtn" class="btn-login">Sign In</button>
        </form>

        <div class="roles-hint">
            <strong>Roles:</strong> admin (full control) &middot; operator (diagnostics) &middot; viewer (read-only)
            <div class="security-badge">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Secured with JWT authentication
            </div>
            <div style="margin-top:16px;text-align:center">
                <a href="/" style="color:#60a5fa;font-size:0.82rem;text-decoration:none">← Go to Customer Chat (no login required)</a>
            </div>
        </div>
    </div>

    <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('loginBtn');
        const errEl = document.getElementById('errorMsg');
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;

        if (!username || !password) {
            errEl.textContent = 'Please enter both username and password.';
            errEl.classList.add('visible');
            if (!username) document.getElementById('username').focus();
            else document.getElementById('password').focus();
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Signing in...';
        errEl.classList.remove('visible');

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();

            if (res.ok && data.status === 'success') {
                // Store token in sessionStorage for JS API calls (cookie is HTTP-only for security)
                sessionStorage.setItem('auth_token', data.token);
                sessionStorage.setItem('auth_user', JSON.stringify(data.user));
                // Redirect to technician dashboard
                window.location.href = '/technician';
            } else {
                let msg = data.detail || 'Login failed';
                // P5: Show lockout feedback with countdown
                if (msg.toLowerCase().includes('locked')) {
                    msg = 'Account temporarily locked. Try again in 5 minutes.';
                    btn.disabled = true;
                    let secs = 30;
                    const timer = setInterval(() => {
                        secs--;
                        btn.textContent = `Locked (${secs}s)`;
                        if (secs <= 0) { clearInterval(timer); btn.disabled = false; btn.textContent = 'Sign In'; }
                    }, 1000);
                }
                errEl.textContent = msg;
                errEl.classList.add('visible');
            }
        } catch (err) {
            errEl.textContent = 'Network error. Is the server running?';
            errEl.classList.add('visible');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Sign In';
        }
    });
    </script>
</body>
</html>
